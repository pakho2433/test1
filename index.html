<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#090b2e">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>星光跳跳島 v2</title>
  <style>
    :root{color-scheme:dark;--glass:rgba(12,15,54,.78);--line:rgba(175,205,255,.48)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:linear-gradient(#0a0d35,#17104a);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;touch-action:none}
    canvas{display:block;width:100%;height:100%}
    #hud{position:fixed;z-index:5;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}
    .panel{background:var(--glass);border:1px solid var(--line);border-radius:15px;padding:9px 12px;box-shadow:0 8px 24px rgba(0,0,0,.25);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-weight:800;text-shadow:0 1px 4px #000}
    #hint{max-width:70vw;font-size:13px}#score{white-space:nowrap}
    #controls{position:fixed;z-index:6;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:end;justify-content:space-between;padding:14px;pointer-events:none}
    .pad{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,56px);gap:7px;pointer-events:auto}
    .btn{display:grid;place-items:center;border:1px solid rgba(215,230,255,.55);border-radius:16px;background:rgba(17,20,70,.78);color:#fff;font-size:21px;font-weight:900;box-shadow:0 8px 22px rgba(0,0,0,.28);user-select:none;-webkit-user-select:none}
    .btn.active,.btn:active{transform:scale(.94);background:rgba(92,86,190,.92)}
    #up{grid-column:2;grid-row:1}#left{grid-column:1;grid-row:2}#down{grid-column:2;grid-row:2}#right{grid-column:3;grid-row:2}
    #jump{pointer-events:auto;width:88px;height:88px;border-radius:28px;background:linear-gradient(145deg,#ffe37a,#ffad4f);color:#201238;border-color:#fff1bd;font-size:18px;box-shadow:0 10px 26px rgba(255,172,70,.3)}
    #overlay{position:fixed;z-index:10;inset:0;display:grid;place-items:center;padding:22px;background:rgba(5,6,28,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    #card{width:min(92vw,440px);padding:27px 22px;text-align:center;background:rgba(14,16,60,.92);border:1px solid rgba(200,220,255,.5);border-radius:25px;box-shadow:0 24px 80px rgba(0,0,0,.48)}
    #card h1{margin:0 0 8px;font-size:clamp(32px,9vw,46px);color:#fff2a8;text-shadow:0 0 18px rgba(255,161,217,.42)}
    #card p{margin:8px 0 20px;line-height:1.6;color:#e6ebff}
    #start,#restart{width:100%;border:0;border-radius:17px;padding:15px;font-size:20px;font-weight:900;color:#201238;background:linear-gradient(90deg,#ffe477,#ffb3df,#9fe8ff)}
    #version{position:fixed;right:10px;bottom:calc(max(12px,env(safe-area-inset-bottom)) + 102px);z-index:4;font-size:11px;color:rgba(255,255,255,.55);pointer-events:none}
    #error{display:none;position:fixed;z-index:20;inset:20px;padding:18px;overflow:auto;white-space:pre-wrap;background:#3d1020;border:1px solid #ff839c;border-radius:16px}
  </style>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
  <div id="hud"><div id="hint" class="panel">收集 5 顆星星，再進入綠色終點。</div><div id="score" class="panel">⭐ 0 / 5</div></div>
  <div id="controls">
    <div class="pad"><button class="btn" id="up" data-key="forward">▲</button><button class="btn" id="left" data-key="left">◀</button><button class="btn" id="down" data-key="back">▼</button><button class="btn" id="right" data-key="right">▶</button></div>
    <button class="btn" id="jump" data-key="jump">跳躍</button>
  </div>
  <div id="version">v2・低光暈修正版</div>
  <div id="overlay"><div id="card"><h1>星光跳跳島</h1><p>跳上彩色浮空平台，收集全部星星。<br>手機按方向鍵移動，按「跳躍」起跳。</p><button id="start">開始遊戲</button></div></div>
  <pre id="error"></pre>

  <script type="module">
    import * as THREE from 'three';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

    const errorBox=document.getElementById('error');
    window.addEventListener('error',e=>{errorBox.style.display='block';errorBox.textContent=`載入錯誤：\n${e.message}\n\n請重新整理頁面。`;});

    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x090b2e);
    scene.fog=new THREE.Fog(0x11113f,24,72);

    const camera=new THREE.PerspectiveCamera(57,innerWidth/innerHeight,.1,130);
    const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
    renderer.setSize(innerWidth,innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
    renderer.outputColorSpace=THREE.SRGBColorSpace;
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=.82;
    renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.prepend(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xa9c9ff,0x24153f,1.25));
    const sun=new THREE.DirectionalLight(0xfff1dc,1.65);
    sun.position.set(8,15,9);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);
    sun.shadow.camera.left=-22;sun.shadow.camera.right=22;sun.shadow.camera.top=22;sun.shadow.camera.bottom=-22;
    scene.add(sun);
    const fill=new THREE.PointLight(0x8075ff,4.5,24,2);fill.position.set(-7,7,4);scene.add(fill);

    const starPos=[];
    for(let i=0;i<600;i++){const r=36+Math.random()*54,a=Math.random()*Math.PI*2,y=(Math.random()-.5)*55;starPos.push(Math.cos(a)*r,y,Math.sin(a)*r);}
    const starGeo=new THREE.BufferGeometry();starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starPos,3));
    const starField=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xbfd5ff,size:.11,transparent:true,opacity:.72,depthWrite:false}));scene.add(starField);

    const platforms=[];
    function addPlatform(x,y,z,w,d,color,label){
      const mat=new THREE.MeshStandardMaterial({color,roughness:.48,metalness:.04,emissive:new THREE.Color(color).multiplyScalar(.035),emissiveIntensity:.25});
      const mesh=new THREE.Mesh(new RoundedBoxGeometry(w,.68,d,5,.18),mat);mesh.position.set(x,y,z);mesh.castShadow=true;mesh.receiveShadow=true;scene.add(mesh);
      const rim=new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry,24),new THREE.LineBasicMaterial({color:new THREE.Color(color).lerp(new THREE.Color(0xffffff),.45),transparent:true,opacity:.48}));mesh.add(rim);
      const tag=makeLabel(label,color);tag.position.set(x,y+1.75,z);scene.add(tag);
      platforms.push({x,y,z,w,d,top:y+.34});
    }
    function makeLabel(text,color){
      const c=document.createElement('canvas');c.width=512;c.height=150;const ctx=c.getContext('2d');
      ctx.fillStyle='rgba(10,12,45,.82)';ctx.strokeStyle='#'+new THREE.Color(color).getHexString();ctx.lineWidth=9;ctx.beginPath();ctx.roundRect(18,18,476,114,30);ctx.fill();ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='900 56px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,256,75);
      const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;
      const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,toneMapped:false}));sprite.scale.set(4.6,1.35,1);return sprite;
    }

    addPlatform(0,0,0,5.8,4.8,0x6d72d9,'起點');
    addPlatform(-3.2,1.15,-4.1,4.2,3.2,0xd8a642,'月光');
    addPlatform(.8,2.25,-7.1,4.1,3.2,0xd75fa8,'花島');
    addPlatform(4.8,3.35,-4.2,4.1,3.2,0x4ebbd6,'雲台');
    addPlatform(6,4.45,.5,4.2,3.2,0x866bd9,'星橋');
    addPlatform(2.1,5.55,4.3,4.5,3.4,0x55c792,'終點');

    const player=new THREE.Group();scene.add(player);
    const white=new THREE.MeshStandardMaterial({color:0xf1f0ff,roughness:.5});
    const lilac=new THREE.MeshStandardMaterial({color:0x9b8ddd,roughness:.48,emissive:0x160f35,emissiveIntensity:.12});
    const dark=new THREE.MeshStandardMaterial({color:0x17132b,roughness:.6});
    const body=new THREE.Mesh(new THREE.SphereGeometry(.62,22,16),lilac);body.scale.y=1.12;body.position.y=.72;body.castShadow=true;player.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.5,22,16),white);head.position.y=1.65;head.castShadow=true;player.add(head);
    const cap=new THREE.Mesh(new THREE.ConeGeometry(.37,.58,18),new THREE.MeshStandardMaterial({color:0xe8b84d,roughness:.48}));cap.position.y=2.24;cap.rotation.z=-.12;player.add(cap);
    const pom=new THREE.Mesh(new THREE.SphereGeometry(.14,14,10),white);pom.position.set(-.05,2.54,0);player.add(pom);
    [-.18,.18].forEach(x=>{const eye=new THREE.Mesh(new THREE.SphereGeometry(.055,10,8),dark);eye.position.set(x,1.76,.47);player.add(eye);});
    const scarf=new THREE.Mesh(new THREE.TorusGeometry(.43,.08,10,28),new THREE.MeshStandardMaterial({color:0xd9558f,roughness:.45}));scarf.rotation.x=Math.PI/2;scarf.position.y=1.3;player.add(scarf);
    const tail=new THREE.Group();for(let i=0;i<5;i++){const orb=new THREE.Mesh(new THREE.SphereGeometry(.13-i*.012,12,9),i%2?white:lilac);orb.position.set(0,i*.22,0);tail.add(orb);}tail.position.set(.56,.88,-.2);tail.rotation.z=-1.03;player.add(tail);

    const spawn=new THREE.Vector3(0,.35,0),velocity=new THREE.Vector3();player.position.copy(spawn);
    let grounded=true,started=false,won=false,collected=0,jumpQueued=false;
    const scoreEl=document.getElementById('score'),hintEl=document.getElementById('hint');

    const starShape=new THREE.Shape();for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,r=i%2===0?.42:.2,x=Math.cos(a)*r,y=Math.sin(a)*r;i?starShape.lineTo(x,y):starShape.moveTo(x,y);}starShape.closePath();
    const starGeometry=new THREE.ExtrudeGeometry(starShape,{depth:.14,bevelEnabled:true,bevelSize:.05,bevelThickness:.05,bevelSegments:2});starGeometry.center();
    const pickupData=[[-3.2,2.25,-4.1],[.8,3.35,-7.1],[4.8,4.45,-4.2],[6,5.55,.5],[2.1,6.65,4.3]];
    const pickups=pickupData.map(([x,y,z])=>{const mesh=new THREE.Mesh(starGeometry,new THREE.MeshStandardMaterial({color:0xffd75e,roughness:.3,metalness:.1,emissive:0x6f3d00,emissiveIntensity:.35}));mesh.position.set(x,y,z);mesh.castShadow=true;scene.add(mesh);return{mesh,baseY:y,collected:false};});

    const portal=new THREE.Group();portal.position.set(2.1,6.65,4.3);scene.add(portal);
    const ringMat=new THREE.MeshStandardMaterial({color:0x59617a,roughness:.28,metalness:.45,emissive:0x0d1220,emissiveIntensity:.1});
    const ring=new THREE.Mesh(new THREE.TorusGeometry(.92,.11,14,48),ringMat);portal.add(ring);
    const core=new THREE.Mesh(new THREE.CircleGeometry(.76,40),new THREE.MeshBasicMaterial({color:0x55d9aa,transparent:true,opacity:0,side:THREE.DoubleSide,toneMapped:false}));core.position.z=-.02;portal.add(core);

    const input={forward:false,back:false,left:false,right:false};
    const keyMap={ArrowUp:'forward',KeyW:'forward',ArrowDown:'back',KeyS:'back',ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right'};
    addEventListener('keydown',e=>{if(e.code==='Space'){jumpQueued=true;e.preventDefault();return;}const k=keyMap[e.code];if(k){input[k]=true;e.preventDefault();}},{passive:false});
    addEventListener('keyup',e=>{const k=keyMap[e.code];if(k){input[k]=false;e.preventDefault();}},{passive:false});
    document.querySelectorAll('[data-key]').forEach(btn=>{const k=btn.dataset.key;const down=e=>{e.preventDefault();btn.classList.add('active');if(k==='jump')jumpQueued=true;else input[k]=true;};const up=e=>{e.preventDefault();btn.classList.remove('active');if(k!=='jump')input[k]=false;};btn.addEventListener('pointerdown',down,{passive:false});btn.addEventListener('pointerup',up,{passive:false});btn.addEventListener('pointercancel',up,{passive:false});btn.addEventListener('pointerleave',up,{passive:false});});
    document.getElementById('start').onclick=()=>{started=true;document.getElementById('overlay').style.display='none';};

    function resetPlayer(){player.position.copy(spawn);velocity.set(0,0,0);grounded=true;hintEl.textContent='掉下去了，已回到起點。';setTimeout(()=>{if(!won)hintEl.textContent='收集 5 顆星星，再進入綠色終點。';},1300);}
    function win(){won=true;started=false;const overlay=document.getElementById('overlay'),card=document.getElementById('card');card.innerHTML='<h1>成功過關！</h1><p>畫面清晰、角色可移動、平台可跳躍，證明 Three.js 遊戲可以在 GitHub Pages 運行。</p><button id="restart">再玩一次</button>';overlay.style.display='grid';document.getElementById('restart').onclick=()=>location.reload();}

    const clock=new THREE.Clock(),desiredCamera=new THREE.Vector3(),lookTarget=new THREE.Vector3();
    function updatePlayer(dt){
      if(!started||won)return;
      let ix=(input.right?1:0)-(input.left?1:0),iz=(input.back?1:0)-(input.forward?1:0);const len=Math.hypot(ix,iz)||1;ix/=len;iz/=len;
      const accel=grounded?13:6.5,maxSpeed=4.6;velocity.x+=ix*accel*dt;velocity.z+=iz*accel*dt;
      const speed=Math.hypot(velocity.x,velocity.z);if(speed>maxSpeed){velocity.x*=maxSpeed/speed;velocity.z*=maxSpeed/speed;}
      const drag=grounded?Math.pow(.002,dt):Math.pow(.22,dt);if(!ix)velocity.x*=drag;if(!iz)velocity.z*=drag;
      if(jumpQueued&&grounded){velocity.y=7.1;grounded=false;}jumpQueued=false;
      velocity.y-=17*dt;const previousY=player.position.y;player.position.addScaledVector(velocity,dt);grounded=false;
      if(velocity.y<=0){for(const p of platforms){const inside=Math.abs(player.position.x-p.x)<=p.w*.5-.15&&Math.abs(player.position.z-p.z)<=p.d*.5-.15;if(inside&&previousY>=p.top-.12&&player.position.y<=p.top+.09){player.position.y=p.top;velocity.y=0;grounded=true;break;}}}
      const moveSpeed=Math.hypot(velocity.x,velocity.z);if(moveSpeed>.12)player.rotation.y=Math.atan2(velocity.x,velocity.z);body.position.y=.72+(grounded&&moveSpeed>.2?Math.sin(performance.now()*.012)*.03:0);tail.rotation.x=Math.sin(performance.now()*.006)*.22;
      if(player.position.y<-10)resetPlayer();
      pickups.forEach((item,i)=>{if(item.collected)return;item.mesh.rotation.y+=dt*1.8;item.mesh.position.y=item.baseY+Math.sin(performance.now()*.002+i)*.12;const d=player.position.clone().add(new THREE.Vector3(0,1,0)).distanceTo(item.mesh.position);if(d<1.15){item.collected=true;item.mesh.visible=false;collected++;scoreEl.textContent=`⭐ ${collected} / 5`;hintEl.textContent=collected===5?'終點已啟動！走進綠色光圈。':`已收集 ${collected} 顆星星。`;if(collected===5){ringMat.color.set(0x55c792);ringMat.emissive.set(0x123c2b);ringMat.emissiveIntensity=.45;core.material.opacity=.34;}}});
      portal.rotation.y+=dt*.55;if(collected===5&&player.position.clone().add(new THREE.Vector3(0,1,0)).distanceTo(portal.position)<1.35)win();
    }
    function updateCamera(dt){desiredCamera.set(player.position.x+7.5,player.position.y+6.2,player.position.z+10.5);camera.position.lerp(desiredCamera,1-Math.pow(.002,dt));lookTarget.set(player.position.x,player.position.y+1.05,player.position.z-1.2);camera.lookAt(lookTarget);}
    function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.033);starField.rotation.y+=dt*.006;updatePlayer(dt);updateCamera(dt);renderer.render(scene,camera);}animate();
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));});
  </script>
</body>
</html>
